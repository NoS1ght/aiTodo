<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TaskTodo - 学生智能任务管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="nav-bar">
    <h1>TaskTodo</h1>
    <div class="nav-actions">
      <button class="btn-icon" id="btnConfig" title="AI 配置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <span class="nav-badge" id="taskCount">0</span>
    </div>
  </header>

  <!-- Tab -->
  <div class="tab-bar">
    <button class="tab active" data-tab="today">每日</button>
    <button class="tab" data-tab="all">全部事件</button>
  </div>

  <!-- 输入区 -->
  <div class="input-area" id="inputArea" style="display:none">
    <textarea id="inputText" placeholder="输入任务描述，AI 自动提取……&#10;例如：明天下午3点交数学作业，周五前复习英语"></textarea>
    <div class="input-actions">
      <div class="input-actions-right">
        <label class="btn-upload" for="fileInput">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          上传图片
        </label>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn btn-outline" id="btnAdd">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加
        </button>
        <button class="btn btn-primary" id="btnExtract">AI 提取</button>
      </div>
    </div>
    <div class="llm-status" id="llmStatus">配置 API Key 后自动保存，无需重复输入</div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card overdue"><span class="stat-num" id="statUrgent">0</span><span class="stat-label">逾期</span></div>
    <div class="stat-card today"><span class="stat-num" id="statToday">0</span><span class="stat-label">今日</span></div>
    <div class="stat-card todo"><span class="stat-num" id="statTodo">0</span><span class="stat-label">待办</span></div>
    <div class="stat-card done"><span class="stat-num" id="statDone">0</span><span class="stat-label">完成</span></div>
  </div>

  <!-- 日计划区（调度视图） -->
  <div class="schedule-area" id="scheduleArea"></div>

  <!-- 任务列表 -->
  <div class="task-list" id="taskList"></div>
</div>

<!-- 添加/编辑任务弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">添加任务</h3><button class="modal-close" id="modalClose">&times;</button></div>
    <div class="modal-body">
      <label>任务标题</label><input type="text" id="inputTitle" placeholder="要做什么...">
      <label>描述</label><textarea id="inputDesc" rows="2" placeholder="可选..."></textarea>
      <label>优先级</label><select id="inputPriority">
        <option value="medium">中</option><option value="high">高</option><option value="urgent">紧急</option><option value="low">低</option>
      </select>
      <label>截止日期</label><input type="datetime-local" id="inputDeadline">
      <label>预计耗时（h）</label><input type="number" id="inputHours" value="2" min="0" step="0.5">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalConfirm">确认</button>
      <button class="btn btn-danger" id="modalDelete" style="display:none">删除</button>
    </div>
  </div>
</div>

<!-- AI 配置弹窗 -->
<div class="modal-overlay" id="configOverlay">
  <div class="modal">
    <div class="modal-header"><h3>AI 配置</h3><button class="modal-close" id="configClose">&times;</button></div>
    <div class="modal-body">
      <label>API Base URL</label><input type="text" id="configApiBase" placeholder="https://api.openai.com/v1">
      <label>API Key</label><input type="password" id="configApiKey" placeholder="sk-...">
      <label>模型</label><input type="text" id="configModel" placeholder="gpt-4o-mini">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="configCancel">取消</button>
      <button class="btn btn-primary" id="configSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
